name: crisp_notation_cli
description: The crisp_notation command-line tool — inspect scores, convert MusicXML/MEI/kern/MIDI/MuseScore/GP/ABC, export LilyPond and braille, render SVG/PNG, and run OMR.
version: 0.4.3
repository: https://github.com/CrispStrobe/crisp_notation
issue_tracker: https://github.com/CrispStrobe/crisp_notation/issues
topics:
  - music
  - music-notation
  - sheet-music
  - smufl

environment:
  sdk: ^3.5.0

resolution: workspace

executables:
  crisp_notation:

dependencies:
  crisp_notation_core: ^0.4.2
  # Optical music recognition: FFI bridge to CrispEmbed's Sheet Music
  # Transformer engine (`omr` command). `ffi`/`image` are pure Dart at compile
  # time; only running `omr` needs the native libcrispembed at runtime.
  ffi: ^2.1.0
  image: ^4.2.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
