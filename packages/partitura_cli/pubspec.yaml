version: 0.4.0-dev.1
repository: https://github.com/CrispStrobe/partitura
publish_to: none

environment:
  sdk: ^3.5.0

resolution: workspace

executables:
  partitura:

dependencies:
  partitura_core: any

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
