name: partitura_cli
description: Command-line tool for the partitura music notation libraries — inspect, convert between MusicXML/MEI/kern/MIDI/MuseScore/GP/ABC (+ LilyPond export), render to SVG/PNG, and OMR.
version: 0.4.0
repository: https://github.com/CrispStrobe/partitura
publish_to: none

environment:
  sdk: ^3.5.0

resolution: workspace

executables:
  partitura:

dependencies:
  partitura_core: ^0.4.0
  # Optical music recognition: FFI bridge to CrispEmbed's Sheet Music
  # Transformer engine (`omr` command). `ffi`/`image` are pure Dart at compile
  # time; only running `omr` needs the native libcrispembed at runtime.
  ffi: ^2.1.0
  image: ^4.2.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
