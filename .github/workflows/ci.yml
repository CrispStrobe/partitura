name: ci

# Ongoing checks on every push to main and every PR: the test suites, format and
# analyze, pub.dev publish-readiness for the library packages, the WasmGC smoke,
# and an iOS build-check (compiles the example without code-signing).
#
# The golden corpus is rasterised by the host, so goldens run on macOS only —
# the baselines are macOS-generated and a Linux runner reports size mismatches
# that mean nothing. Keep it that way; do not "fix" goldens on Linux.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  format-analyze:
    name: format + analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: dart format
        run: dart format --set-exit-if-changed packages/*/lib packages/*/test
      - name: flutter analyze
        run: flutter analyze

  core-tests:
    name: crisp_notation_core tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: dart test
        working-directory: packages/crisp_notation_core
        run: dart test

  layout-benchmark:
    name: layout benchmark (regression gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      # AOT-compiled: JIT numbers are 10-40x wrong (see docs/PERF.md). The gate
      # is a runner-speed-independent linearity ratio, so it does not flake on a
      # slow shared runner but still catches an accidental O(n^2) layout pass.
      - name: benchmark + gate
        working-directory: packages/crisp_notation_core
        run: |
          dart compile exe benchmark/layout_benchmark.dart -o /tmp/lb
          /tmp/lb

  cli-tests:
    name: crisp_notation_cli tests
    # macOS: the CLI's PNG-render tests need the Flutter SDK (they shell out to
    # the crisp_notation package's render_png.dart); the rest are pure Dart.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: dart test
        working-directory: packages/crisp_notation_cli
        run: dart test

  flutter-tests:
    name: crisp_notation widget + golden tests
    # macOS: the golden baselines are macOS-generated (see the note above).
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: flutter test
        working-directory: packages/crisp_notation
        run: flutter test
      - name: Upload golden failure diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-failures
          path: packages/crisp_notation/test/failures/
          if-no-files-found: ignore

  publish-dry-run:
    name: pub.dev publish dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: crisp_notation_core
        working-directory: packages/crisp_notation_core
        run: dart pub publish --dry-run
      - name: crisp_notation
        working-directory: packages/crisp_notation
        run: dart pub publish --dry-run

  wasm-smoke:
    name: wasm (dart2wasm) + node smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Compile to WasmGC
        working-directory: packages/crisp_notation_core/example/wasm
        run: bash build.sh
      - name: Run the WASM codec smoke under Node
        working-directory: packages/crisp_notation_core/example/wasm
        run: node run_node.mjs

  ios-build-check:
    name: iOS build-check (no codesign)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Build iOS (no code signing)
        working-directory: packages/crisp_notation/example
        run: flutter build ios --no-codesign
