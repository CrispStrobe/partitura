name: Publish crisp_notation to pub.dev
on:
  push:
    tags: ['crisp_notation-v[0-9]+.[0-9]+.[0-9]+']
jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pub.dev
    permissions:
      id-token: write  # OIDC auth to pub.dev (no stored secrets)
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Publish
        working-directory: packages/crisp_notation
        run: |
          flutter pub get
          flutter pub publish --force
