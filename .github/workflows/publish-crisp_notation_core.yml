name: Publish crisp_notation_core to pub.dev
on:
  push:
    tags: ['crisp_notation_core-v[0-9]+.[0-9]+.[0-9]+']
jobs:
  publish:
    permissions:
      id-token: write  # OIDC auth to pub.dev (no stored secrets)
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: packages/crisp_notation_core
